# Star Fox 64: Recompiled — Randomizer

[manifest]
id = "sf64_randomizer_hoebbisch"
version = "0.6.0"
display_name = "Star Fox 64 Randomizer"
description = """
A seed-based, fully deterministic randomizer for Star Fox 64: Recompiled. \
Same seed = same run, so it's speedrun-friendly. \

Inspired by punk7890's original ASM randomizer. Built on sonicdcer's recomp & decomp. \
Free & open source."""
short_description = "Seed-based randomizer (speedrun-friendly). WIP."
authors = [ "Hoebbisch" ]
game_id = "sf64"
minimum_recomp_version = "1.0.0"

dependencies = [ ]
native_libraries = [ ]

[inputs]
elf_path = "build/mod.elf"
mod_filename = "sf64_randomizer"
func_reference_syms_file = "Starfox64RecompSyms/sf64.us.rev1.syms.toml"
data_reference_syms_files = [ "Starfox64RecompSyms/sf64.us.rev1.datasyms.toml" ]
additional_files = [ ]

# -------------------------------------------------------------------------
# Config options (erscheinen im Mods-Menue unter diesem Mod)
# -------------------------------------------------------------------------

[[manifest.config_options]]
id = "seed"
name = "Seed"
description = "Seed-Text (z.B. 'RUN-123'). Gleicher Seed = gleicher Run. Leer = Standard-Seed."
type = "String"
default = "lylat"

[[manifest.config_options]]
id = "enum_random_planets"
name = "Random Planets"
description = "Ersetzt jedes Level seed-deterministisch durch ein zufaelliges (Venom-Endgame bleibt). WIP."
type = "Enum"
options = [ "Enabled", "Disabled" ]
default = "Enabled"

[[manifest.config_options]]
id = "enum_start_planet"
name = "Start Planet"
description = "Random = erstes Level zufaellig (wie Original). Corneria = klassischer fester Start. Aendert NICHT die Seed-Route der Slots 1-5."
type = "Enum"
options = [ "Random", "Corneria" ]
default = "Random"

[[manifest.config_options]]
id = "enum_random_items"
name = "Random Items"
description = "Tauscht Item-Drops seed-deterministisch (Typ -> Typ). Pfad-Marker bleiben unberuehrt."
type = "Enum"
options = [ "Enabled", "Disabled" ]
default = "Enabled"

[[manifest.config_options]]
id = "enum_random_music"
name = "Random Music"
description = "Mischt die Level-Musik deterministisch nach Seed."
type = "Enum"
options = [ "Enabled", "Disabled" ]
default = "Enabled"

[[manifest.config_options]]
id = "enum_marathon"
name = "Marathon"
description = "Spielt alle 12 normalen Planeten am Stueck OHNE Karte dazwischen, dann ins Venom-Finale. Gateway waehlbar: Bolse (-> Venom 1 -> Venom 2 -> Andross) oder Area 6 (-> Venom 2 -> Andross, kuerzer/haerter). Die Expert-Varianten erzwingen zusaetzlich den Expert-Schwierigkeitsgrad."
type = "Enum"
options = [ "Disabled", "Bolse", "Area 6", "Expert + Bolse", "Expert + Area 6" ]
default = "Disabled"

[[manifest.config_options]]
id = "enum_marathon_order"
name = "Marathon: Level-Reihenfolge"
description = "Reihenfolge der 12 Planeten im Marathon. Shuffled = seed-deterministisch gemischt (jeder Seed ein anderer Marathon, fair teilbar). Fixed = immer dieselbe feste Reihenfolge. Nur wirksam wenn Marathon an ist."
type = "Enum"
options = [ "Shuffled (Seed)", "Fixed" ]
default = "Shuffled (Seed)"

[[manifest.config_options]]
id = "enum_expert_mode"
name = "Expert Mode"
description = "Startet den Run direkt im Expert-Schwierigkeitsgrad (doppelter Schaden, mehr Gegner, Expert-Ending) — ohne ihn erst freispielen zu muessen. Wird beim Neuen Spiel fuer den ganzen Run festgelegt."
type = "Enum"
options = [ "Disabled", "Enabled" ]
default = "Disabled"

[[manifest.config_options]]
id = "enum_one_hit_ko"
name = "One-Hit-KO (Hardmode)"
description = "Fox stirbt bei jedem Treffer sofort. Ein aktives Schild-Item darf seinen einen Treffer noch absorbieren."
type = "Enum"
options = [ "Disabled", "Enabled" ]
default = "Disabled"

[[manifest.config_options]]
id = "enum_ship_skin"
name = "Ship Skin"
description = "Tauscht das Spielerschiff-Modell gegen Wolfen, Wolfen (Venom), Katt oder Bill. Rein kosmetisch (Hitbox/Steuerung unveraendert). Das Modell wird bei Level-Eintritt nachgeladen, funktioniert also in jedem Level."
type = "Enum"
options = [ "Arwing", "Wolfen", "Wolfen (Venom)", "Katt", "Bill" ]
default = "Arwing"

[[manifest.config_options]]
id = "enum_skip_intros"
name = "Skip Intros & Briefings (QoL)"
description = "Level-Intros und Mission-Briefings immer mit START skippbar / A beschleunigbar (auch beim ersten Durchgang)."
type = "Enum"
options = [ "Enabled", "Disabled" ]
default = "Enabled"
